name: Auto Merge

on:
  pull_request:
    types: [opened, synchronized]

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Auto merge
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['auto-merge']
            })
